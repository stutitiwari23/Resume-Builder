<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="css/style.css">
  <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
</head>
<body>
<div
  style="
    background:#fff3cd;
    padding:12px;
    border:1px solid #ffeeba;
    font-size:14px;
    margin-bottom:10px;
  "
  role="alert"
>
  ⚠️ <strong>Demo Project:</strong>
  This resume builder is for demonstration purposes only.
  Do not enter real personal information (email, phone, address, etc.).
</div>

  <div class="auth-container">
    <div class="auth-page">
    <form class="auth-card" id="signup-form">
      <h2>Create Account</h2>
      <p class="subtitle">Join us today</p>

      <div class="input-group">
        <input type="text" id="signup-fullname" required placeholder=""/>
        <label>Full Name</label>
      </div>
      <div class="error-message" id="signup-fullname-error"></div>

      <div class="input-group">
        <input type="email" id="signup-email" required placeholder=""/>
        <label>Email</label>
      </div>
      <div class="error-message" id="signup-email-error"></div>

      <div class="input-group password-group">
        <input type="password" id="signup-password" required placeholder="" />
        <label>Password</label>
        <span class="eye" onclick="togglePassword('signup-password', this)">👁</span>
      </div>
      <div class="error-message" id="signup-password-error"></div>

      <button type="submit" class="btn">Sign Up</button>

      <p class="switch">
        Already have an account?
        <a href="sign-in.html">Sign In</a>
      </p>
      
      <p class="switch" style="margin-top: 1rem; font-size: 0.85rem; color: #666;">
        <a href="index.html" style="color: #666; text-decoration: none;">← Back to Home</a>
      </p>
    </form>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="validation.js"></script>
  <script>
    function togglePassword(inputId, eyeIcon) {
      const input = document.getElementById(inputId);

      if (input.type === "password") {
        input.type = "text";
        eyeIcon.textContent = "👁";
      } else {
        input.type = "password";
        eyeIcon.textContent = "👁";
      }
    }

    function showError(fieldId, message) {
      const errorEl = document.getElementById(fieldId + '-error');
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
      }
    }

    function clearError(fieldId) {
      const errorEl = document.getElementById(fieldId + '-error');
      if (errorEl) {
        errorEl.textContent = '';
        errorEl.style.display = 'none';
      }
    }

    function showToast(message, type = 'info') {
      const existingToast = document.querySelector('.toast-notification');
      if (existingToast) {
        existingToast.remove();
      }

      const toast = document.createElement('div');
      toast.className = `toast-notification toast-${type} show`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("signup-form");

      if (form) {
        form.addEventListener("submit", (e) => {
          e.preventDefault();

          const fullnameInput = document.getElementById('signup-fullname');
          const emailInput = document.getElementById('signup-email');
          const passwordInput = document.getElementById('signup-password');

          const fullname = fullnameInput.value.trim();
          const email = emailInput.value.trim();
          const password = passwordInput.value;

          clearError('signup-fullname');
          clearError('signup-email');
          clearError('signup-password');

          let isValid = true;

          if (!fullname || fullname.length < 2) {
            showError('signup-fullname', 'Please enter a valid name (at least 2 characters)');
            isValid = false;
          }

          if (!email) {
            showError('signup-email', 'Email is required');
            isValid = false;
          } else if (!Validator.isValidEmail(email)) {
            showError('signup-email', 'Please enter a valid email address');
            isValid = false;
          }

          if (!password) {
            showError('signup-password', 'Password is required');
            isValid = false;
          } else if (password.length < 6) {
            showError('signup-password', 'Password must be at least 6 characters');
            isValid = false;
          }

          if (!isValid) return;

          if (getUserData(email)) {
            showError('signup-email', 'Email already registered');
            showToast('This email is already registered. Please login instead.', 'error');
            return;
          }

          const newUser = {
            fullName: fullname,
            password: password,
            profile: { fullname: fullname, email: email },
            resume: {},
            theme: 'light',
            session: false
          };

          saveUserData(email, newUser);

          showToast('Registration successful! Please login.', 'success');

          setTimeout(() => {
            window.location.href = './sign-in.html';
          }, 1500);
        });
      }
    });
  </script>

  <style>
    .error-message {
      color: #dc3545;
      font-size: 0.875rem;
      margin-top: 0.25rem;
      margin-bottom: 0.5rem;
      display: none;
    }

    .toast-notification {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background-color: #ffffff;
      color: #333333;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      opacity: 0;
      transform: translateX(100%);
      transition: all 0.3s ease;
      font-size: 0.95rem;
      max-width: 350px;
    }

    .toast-notification.show {
      opacity: 1;
      transform: translateX(0);
    }

    .toast-success {
      border-left: 4px solid #28a745;
    }

    .toast-error {
      border-left: 4px solid #dc3545;
    }

    .toast-info {
      border-left: 4px solid #17a2b8;
    }

    @media (max-width: 768px) {
      .toast-notification {
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        max-width: none;
      }
    }
  </style>
</body>
</html>
